<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Hospital Billing Login</title>
        <link rel="stylesheet" href="login1.css">
</head>
<body>
    <div class="heading">Billing Management System</div>
    <div class="hospital-symbol">+</div>

    <div class="main-container">
        <div class="image-container">
            <img src="doctor.png" alt="Doctor Image">
        </div>
        <div class="login-container">
            <h2>Login</h2>
            <form id="login-form" action="/login1" method="post">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <p id="error-message"></p>
                <input type="submit" value="Login">
                <div class="forgot-password">
                    <a href="for.html">Forgot your password?</a>
                </div>
            </form>
        </div>
    </div>

    
    <script>
        document.getElementById("login-form").addEventListener("submit", async function(event) {
            event.preventDefault(); 
    
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMessage = document.getElementById("error-message");
    
            const response = await fetch("/login1", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
    
            const data = await response.json(); 
    
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                errorMessage.textContent = data.message;
                errorMessage.style.display = "block";
            }
        });
    </script>
</body>
</html>
